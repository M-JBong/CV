about: >
  Ph.D. candidate in Inorganic Chemistry at Korea University (expected February 2027),
  specializing in the design of single-molecule Mn(I) catalysts for selective CO₂ reduction.
  Research centers on secondary coordination sphere engineering of well-defined molecular
  complexes — inspired by formate dehydrogenase enzymes — integrating experimental
  (operando FTIR, CV, XRD) and computational (DFT; ORCA) approaches with Python-based
  automation of computational workflows. Key results include a TON of ~300 with >94%
  formate selectivity, published in Chemical Science (2026, co-first author).

