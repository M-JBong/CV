name: Build and Deploy CV PDF

on:
  push:
    branches: [ main ]
    paths:
      - cv.yml
      - cv.typ

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile CV PDF
        run: typst compile cv.typ CV.pdf

      - name: Upload PDF to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: CV.pdf
          destination_dir: data
          keep_files: true
